<!DOCTYPE html>
<html>
<head>
  <title>Minima Pixel Board</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: sans-serif;
      text-align: center;
      background: #f5f5f5;
    }

    #grid {
      display: grid;
      grid-template-columns: repeat(10, 30px);
      gap: 4px;
      justify-content: center;
      margin-top: 20px;
    }

    .pixel {
      width: 30px;
      height: 30px;
      background: #ddd;
      cursor: pointer;
    }
  </style>
</head>

<body>

<h2>🎨 Pixel Board</h2>
<p id="status">Connecting...</p>

<input type="color" id="colorPicker" value="#ff0000">

<div id="grid"></div>

<script src="app.js"></script>

</body>
</html>
